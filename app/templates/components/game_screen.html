<div id="game-container">
<div class="game-layout">
    <header class="game-header">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="ghost-btn">
            ← Back
        </button>
        <h1 class="game-title">Soc Ops</h1>
        <div class="header-spacer"></div>
    </header>

    <p class="game-help">
        Tap a square when you find someone who matches it.
    </p>

    {% if session.has_bingo %}
    <div class="bingo-banner" role="status" aria-live="polite">
        🎉 BINGO! You got a line!
    </div>
    {% endif %}

    <div class="board-stage">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
