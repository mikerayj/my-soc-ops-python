<div id="game-container">
<div class="sc-layout">
    <div class="sc-card">

        <!-- Hero: brand identity + mini board preview -->
        <div class="sc-hero">
            <div class="sc-brand">
                <p class="sc-kicker">Interactive Icebreaker</p>
                <h1 class="sc-title">Soc Ops</h1>
                <p class="sc-tagline">Social Bingo</p>
            </div>
            <!-- Decorative mini board — aria-hidden, no interaction -->
            <div class="sc-board-preview" aria-hidden="true" role="presentation">
                <p class="sc-preview-label">In Progress</p>
                <div class="sc-mini-board">
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>

                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>

                    <div class="sc-mb-cell sc-mb-win"></div>
                    <div class="sc-mb-cell sc-mb-win"></div>
                    <div class="sc-mb-cell sc-mb-free">★</div>
                    <div class="sc-mb-cell sc-mb-win"></div>
                    <div class="sc-mb-cell sc-mb-win"></div>

                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>

                    <div class="sc-mb-cell sc-mb-marked"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell"></div>
                    <div class="sc-mb-cell sc-mb-marked"></div>
                </div>
            </div>
        </div>

        <!-- How to play steps -->
        <div class="sc-rules-section">
            <h2 class="sc-rules-heading">How to play</h2>
            <ol class="sc-steps">
                <li class="sc-step">
                    <span class="sc-step-num">01</span>
                    <span class="sc-step-text">Find people who match the questions</span>
                </li>
                <li class="sc-step">
                    <span class="sc-step-num">02</span>
                    <span class="sc-step-text">Tap a square when you find a match</span>
                </li>
                <li class="sc-step">
                    <span class="sc-step-num">03</span>
                    <span class="sc-step-text">Get 5 in a row to win!</span>
                </li>
            </ol>
        </div>

        <!-- Primary CTA -->
        <div class="sc-cta-zone">
            <button
                hx-post="/start"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="sc-start-btn">
                Start Game
            </button>
        </div>

    </div>
</div>
</div>
