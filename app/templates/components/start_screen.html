<div id="game-container">
<div class="start-layout">
    <div class="start-card">
        <p class="brand-kicker">Interactive Icebreaker</p>
        <h1 class="brand-title">Soc Ops</h1>
        <p class="brand-tagline">Connect with the room — find people who match,<br> mark squares, and get 5&nbsp;in&nbsp;a&nbsp;row.</p>

        <div class="highlight-chips">
            <span class="chip"><span class="chip-num">25</span> prompts</span>
            <span class="chip">Quick rounds</span>
            <span class="chip">5-in-a-row</span>
        </div>

        <div class="rules-card">
            <h2>How to play</h2>
            <ul class="rules-list">
                <li>Find people who match the questions</li>
                <li>Tap a square when you find a match</li>
                <li>Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="primary-btn">
            Start Game
        </button>
    </div>
</div>
</div>
