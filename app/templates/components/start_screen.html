<div id="game-container">
<div class="sl-layout">
    <!-- Geometric background accents (CSS-only, decorative) -->
    <div class="sl-geo sl-geo-1" aria-hidden="true"></div>
    <div class="sl-geo sl-geo-2" aria-hidden="true"></div>
    <div class="sl-geo sl-geo-3" aria-hidden="true"></div>

    <div class="sl-card">
        <!-- Hero -->
        <div class="sl-hero sl-reveal-1">
            <span class="sl-badge">✦ Interactive Icebreaker ✦</span>
            <h1 class="sl-title">Soc Ops</h1>
            <p class="sl-tagline">Social Bingo — find your people</p>
        </div>

        <!-- Journey strip: 3 quick steps -->
        <div class="sl-steps sl-reveal-2" aria-label="How the game works">
            <div class="sl-step">
                <span class="sl-step-num">1</span>
                <span class="sl-step-label">Find a match</span>
            </div>
            <span class="sl-step-arrow" aria-hidden="true">›</span>
            <div class="sl-step">
                <span class="sl-step-num">2</span>
                <span class="sl-step-label">Mark the square</span>
            </div>
            <span class="sl-step-arrow" aria-hidden="true">›</span>
            <div class="sl-step">
                <span class="sl-step-num">3</span>
                <span class="sl-step-label">Get 5 in a row!</span>
            </div>
        </div>

        <!-- Rules -->
        <div class="sl-rules sl-reveal-3">
            <h2 class="sl-rules-heading">How to play</h2>
            <ul class="sl-rules-list">
                <li>Find people who match the questions</li>
                <li>Tap a square when you find a match</li>
                <li>Get 5 in a row to win!</li>
            </ul>
        </div>

        <!-- CTA -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="sl-cta sl-reveal-4">
            Start Game
        </button>
    </div>
</div>
</div>
